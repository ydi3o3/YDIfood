<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맛집지도</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Apple SD Gothic Neo','Segoe UI',sans-serif; background:#f8f8f6; color:#1a1a1a; }

  header {
    background:#fff; border-bottom:1px solid #eee;
    padding:18px 36px; display:flex; align-items:center;
    justify-content:space-between; position:sticky; top:0; z-index:200;
  }
  .logo { font-size:1.35rem; font-weight:700; }
  .logo span { color:#e85d04; }
  .search-bar input {
    border:1px solid #ddd; border-radius:20px;
    padding:8px 18px; font-size:0.88rem;
    outline:none; width:210px; background:#f8f8f6;
  }
  .search-bar input:focus { border-color:#e85d04; }

  .hero {
    background:linear-gradient(135deg,#fff5f0,#fff);
    text-align:center; padding:50px 20px 32px;
    border-bottom:1px solid #f0ece8;
  }
  .hero h1 { font-size:1.9rem; font-weight:700; margin-bottom:6px; }
  .hero h1 span { color:#e85d04; }
  .hero p { color:#999; font-size:0.9rem; }

  .region-tabs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:24px 20px 8px; }
  .tab-btn {
    padding:7px 20px; border-radius:20px; border:1.5px solid #ddd; background:#fff;
    cursor:pointer; font-size:0.85rem; font-weight:500; transition:all .2s; color:#555;

  }
  .tab-btn:hover { border-color:#e85d04; color:#e85d04; }
  .tab-btn.active { background:#e85d04; color:#fff; border-color:#e85d04; }

  .category-filters { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; padding:12px 20px 22px; }
  .cat-btn {
    padding:5px 13px; border-radius:14px; border:1px solid #e0e0e0; background:#fff;
    cursor:pointer; font-size:0.8rem; color:#666; transition:all .2s;
  }
  .cat-btn:hover, .cat-btn.active { background:#fff5f0; border-color:#e85d04; color:#e85d04; font-weight:600; }

  .main { max-width:1100px; margin:0 auto; padding:0 24px 60px; }
  .section-title { font-size:1.05rem; font-weight:600; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
  .section-title .count { font-size:0.82rem; color:#aaa; font-weight:400; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }

  .card {
    background:#fff; border-radius:16px; overflow:hidden;
    border:1px solid #f0ece8; transition:transform .2s,box-shadow .2s; cursor:pointer;
  }
  .card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,.09); }
  .card-img { width:100%; height:160px; display:flex; align-items:center; justify-content:center; font-size:3.2rem; background:#fff8f5; }
  .card-body { padding:14px 16px 16px; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; }
  .card-name { font-size:0.97rem; font-weight:700; }
  .card-rating { font-size:0.83rem; color:#e85d04; font-weight:600; }
  .card-cat { display:inline-block; font-size:0.73rem; background:#fff5f0; color:#e85d04; padding:3px 9px; border-radius:10px; margin-bottom:7px; font-weight:500; }
  .card-desc { font-size:0.81rem; color:#777; line-height:1.5; }
  .card-region { font-size:0.74rem; color:#bbb; margin-top:9px; }
  .no-result { text-align:center; padding:60px 20px; color:#bbb; font-size:0.92rem; grid-column:1/-1; }

  /* Modal */

  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:center; justify-content:center; padding:20px; }
  .overlay.open { display:flex; }
  .modal { background:#fff; border-radius:20px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; position:relative; }
  .modal-img { width:100%; height:200px; display:flex; align-items:center; justify-content:center; font-size:5rem; background:#fff8f5; border-radius:20px 20px 0 0; }
  .modal-body { padding:22px 24px 28px; }
  .modal-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
  .modal-name { font-size:1.25rem; font-weight:700; }
  .modal-rating { font-size:1rem; color:#e85d04; font-weight:700; }
  .modal-meta { font-size:0.82rem; color:#999; margin-bottom:16px; }
  .close-btn {
    position:absolute; top:14px; right:16px; background:rgba(0,0,0,.35); border:none; color:#fff;
    width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
  }
  .section-label { font-size:0.88rem; font-weight:700; color:#333; margin:18px 0 10px; display:flex; align-items:center; gap:6px; }
  .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:4px; }
  .menu-item { background:#f8f8f6; border-radius:10px; padding:10px 12px; }
  .menu-item-name { font-size:0.85rem; font-weight:600; }
  .menu-item-price { font-size:0.78rem; color:#e85d04; margin-top:2px; font-weight:600; }
  .menu-item-desc { font-size:0.74rem; color:#999; margin-top:2px; line-height:1.4; }

  /* AI Review */
  .review-box {
    background:#fffaf7; border:1px solid #ffe0cc; border-radius:12px;
    padding:14px 16px; font-size:0.84rem; color:#555; line-height:1.7; min-height:60px;
  }
  .review-box.loading { color:#bbb; font-style:italic; }
  .ai-badge { font-size:0.7rem; background:#e85d04; color:#fff; padding:2px 7px; border-radius:8px; margin-left:6px; font-weight:600; vertical-align:middle; }
  /* Buttons */
  .btn-row { display:flex; gap:10px; margin-top:16px; }
  .map-btn, .review-btn {
    display:flex; align-items:center; gap:7px; border:none;
    border-radius:10px; padding:11px 18px; font-size:0.85rem;
    font-weight:600; cursor:pointer; flex:1; justify-content:center;
    text-decoration:none; transition:background .2s;
  }
  .map-btn { background:#1a73e8; color:#fff; }
  .map-btn:hover { background:#1558b0; }
  .review-btn { background:#4285f4; color:#fff; }
  .review-btn:hover { background:#2a6dd9; }

  @media(max-width:600px){
    header { padding:14px 18px; }
    .hero h1 { font-size:1.4rem; }
    .grid { grid-template-columns:1fr; }
    .menu-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">맛<span>집</span>지도</div>
  <div class="search-bar"><input type="text" id="searchInput" placeholder="🔍  맛집 검색..." oninput="render()"></div>
</header>

<div class="hero">
  <h1>대한민국 <span>맛집</span> 탐방</h1>
  <p>지역별 엄선된 맛집을 AI 리뷰와 함께 소개합니다</p>
</div>

<div class="region-tabs" id="regionTabs"></div>
<div class="category-filters" id="catFilters"></div>

<div class="main">
  <div class="section-title" id="sectionTitle"></div>
  <div class="grid" id="grid"></div>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModalDirect()">✕</button>
    <div class="modal-img" id="mImg"></div>
    <div class="modal-body">
      <div class="modal-top">
        <div class="modal-name" id="mName"></div>
        <div class="modal-rating" id="mRating"></div>
      </div>
      <div class="modal-meta" id="mMeta"></div>
      <div class="section-label">🍽️ 대표 메뉴</div>
      <div class="menu-grid" id="mMenu"></div>
      <div class="section-label">✨ AI 리뷰 <span class="ai-badge">Claude</span></div>
      <div class="review-box" id="mReview"></div>
      <div class="btn-row">
        <a class="map-btn" id="mMapBtn" href="#" target="_blank">📍 지도 보기</a>
        <a class="review-btn" id="mReviewBtn" href="#" target="_blank">⭐ 구글 리뷰 보기</a>
      </div>
    </div>
  </div>
</div>

const regions = ["전체","수도권","경기도","경상남도","경상북도","전라도","전라남도"];
const categories = ["전체","한식","해산물","양식","일식","중식","카페/디저트"];
let activeRegion="전체", activeCat="전체";

function init() {
  const tabsEl = document.getElementById("regionTabs");
  regions.forEach(r => {
    const btn = document.createElement("button");
    btn.className = "tab-btn"+(r===activeRegion?" active":"");
    btn.textContent = r;
    btn.onclick = () => { activeRegion=r; render(); updateTabs(); };
    tabsEl.appendChild(btn);
  });
  const catEl = document.getElementById("catFilters");
  categories.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "cat-btn"+(c===activeCat?" active":"");
    btn.textContent = c;
    btn.onclick = () => { activeCat=c; render(); updateCats(); };
    catEl.appendChild(btn);
  });
  render();
}
function updateTabs() { document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",regions[i]===activeRegion)); }
function updateCats() { document.querySelectorAll(".cat-btn").forEach((b,i)=>b.classList.toggle("active",categories[i]===activeCat)); }

function render() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  let data = restaurants;
  if (activeRegion!=="전체") data=data.filter(r=>r.region===activeRegion);
  if (activeCat!=="전체") data=data.filter(r=>r.cat===activeCat);
  if (q) data=data.filter(r=>r.name.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)||r.city.includes(q));
  document.getElementById("sectionTitle").innerHTML=`${activeRegion==="전체"?"전체 지역":activeRegion} 맛집 <span class="count">${data.length}곳</span>`;
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  if (!data.length) { grid.innerHTML=`<div class="no-result">😔 조건에 맞는 맛집이 없습니다.</div>`; return; }
  data.forEach(r => {
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-img">${r.emoji}</div>
      <div class="card-body">
        <div class="card-top"><div class="card-name">${r.name}</div><div class="card-rating">★ ${r.rating}</div></div>
        <span class="card-cat">${r.cat}</span>
        <div class="card-desc">${r.desc}</div>
        <div class="card-region">📍 ${r.city}</div>
      </div>`;
    card.onclick=()=>openModal(r);
    grid.appendChild(card);
  });
}

function openModal(r) {
  document.getElementById("mImg").textContent=r.emoji;
  document.getElementById("mName").textContent=r.name;
  document.getElementById("mRating").textContent="★ "+r.rating;
  document.getElementById("mMeta").textContent=`📍 ${r.city}  |  ${r.cat}`;
  document.getElementById("mMenu").innerHTML=r.menu.map(m=>`
    <div class="menu-item">
      <div class="menu-item-name">${m.n}</div>
      <div class="menu-item-price">${m.p}</div>
      <div class="menu-item-desc">${m.d}</div>
    </div>`).join("");

  // 지도 & 리뷰 링크
  const q=encodeURIComponent(r.city+" "+r.name);
  document.getElementById("mMapBtn").href=`https://www.google.com/maps/search/?api=1&query=${q}`;
  document.getElementById("mReviewBtn").href=`https://www.google.com/maps/search/?api=1&query=${q}`;

  // AI 리뷰
  const reviewEl=document.getElementById("mReview");
  reviewEl.className="review-box loading";
  reviewEl.textContent="Claude AI가 리뷰를 생성 중입니다...";
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow="hidden";
  fetchReview(r, reviewEl);
}

async function fetchReview(r, el) {
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:400,
        system:"당신은 한국 맛집 전문 푸드 크리틱입니다. 주어진 맛집 정보를 바탕으로 생생하고 감성적인 리뷰를 2~3문장으로 작성하세요. 실제 방문한 것처럼 자연스럽고 신뢰감 있게 작성하되, 해당 지역 음식의 특색을 잘 살려주세요. 이모지를 1~2개 사용해도 좋습니다.",
        messages:[{role:"user",content:`맛집명: ${r.name}\n지역: ${r.city}\n카테고리: ${r.cat}\n평점: ${r.rating}/5\n설명: ${r.desc}\n대표메뉴: ${r.menu.map(m=>m.n).join(", ")}\n\n위 맛집의 감성적인 리뷰를 2~3문장으로 작성해주세요.`}]
      })
    });
    const data=await res.json();
    el.className="review-box";
    el.textContent=data.content?.[0]?.text||"리뷰를 불러올 수 없습니다.";
  } catch(e) {
    el.className="review-box";
    el.textContent="리뷰를 불러오는 중 오류가 발생했습니다.";
  }
}

function closeModal(e) { if(e.target===document.getElementById("overlay")) closeModalDirect(); }
function closeModalDirect() { document.getElementById("overlay").classList.remove("open"); document.body.style.overflow=""; }

init();
</script>
