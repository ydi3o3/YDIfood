// 로직 부분
let activeRegion = "전체", activeCat = "전체";
const regions = ["전체", "수도권", "경기도", "경상남도", "경상북도", "전라도", "전라남도"];
const categories = ["전체", "한식", "해산물", "양식", "일식", "중식", "카페/디저트"];

function init() {
  const tabs = document.getElementById("regionTabs");
  regions.forEach(r => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (r === activeRegion ? " active" : "");
    btn.innerText = r;
    btn.onclick = () => { activeRegion = r; updateUI(); };
    tabs.appendChild(btn);
  });
  const cats = document.getElementById("catFilters");
  categories.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (c === activeCat ? " active" : "");
    btn.innerText = c;
    btn.onclick = () => { activeCat = c; updateUI(); };
    cats.appendChild(btn);
  });
  render();
}

function updateUI() {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.innerText === activeRegion));
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.toggle("active", b.innerText === activeCat));
  render();
}

function render() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  let filtered = restaurants;
  if (activeRegion !== "전체") filtered = filtered.filter(r => r.region === activeRegion);
  if (activeCat !== "전체") filtered = filtered.filter(r => r.cat.includes(activeCat));
  if (q) filtered = filtered.filter(r => r.name.includes(q) || r.city.includes(q) || r.desc.includes(q));

  document.getElementById("sectionTitle").innerHTML = `${activeRegion} 맛집 <span class="count">${filtered.length}곳</span>`;
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.map((r, i) => `
    <div class="card" onclick="openModal(${restaurants.indexOf(r)})">
      <div class="card-img">${r.emoji}</div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <span class="card-cat">${r.cat}</span>
        <div class="card-desc">${r.desc}</div>
        <div class="card-region">📍 ${r.city}</div>
      </div>
    </div>`).join("");
}

function openModal(idx) {
  const r = restaurants[idx];
  const content = `
    <div style="font-size:3rem; text-align:center; background:#fffaf7; padding:20px; border-radius:10px;">${r.emoji}</div>
    <h2 style="margin-top:15px;">${r.name} <span style="font-size:0.9rem; color:#e85d04;">★ ${r.rating}</span></h2>
    <p style="color:#999; font-size:0.85rem; margin-bottom:15px;">📍 ${r.city} | ${r.cat}</p>
    <div style="font-weight:700; margin-bottom:10px; font-size:0.9rem;">🍴 추천 메뉴</div>
    ${r.menu.map(m => `
      <div class="menu-item">
        <div><div class="menu-n">${m.n}</div><div style="font-size:0.75rem; color:#999;">${m.d}</div></div>
        <div class="menu-p">${m.p}</div>
      </div>`).join("")}
    <div class="ai-review">
      <b>AI 맛평가:</b> ${r.name}은(는) ${r.city} 지역에서 평점 ${r.rating}점을 기록 중인 맛집입니다. ${r.desc} 특히 ${r.menu[0].n}을 추천합니다!
    </div>
  `;
  document.getElementById("modalContent").innerHTML = content;
  document.getElementById("overlay").classList.add("open");
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); }

init();
</script>
</body>
</html>
